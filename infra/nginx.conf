# ProdScope HTTPS reverse proxy configuration
# Usage:
#   1. Install nginx + certbot:
#        sudo apt install nginx certbot python3-certbot-nginx
#   2. Copy this file:
#        sudo cp infra/nginx.conf /etc/nginx/sites-available/prodscope
#        sudo ln -s /etc/nginx/sites-available/prodscope /etc/nginx/sites-enabled/
#   3. Replace YOUR_DOMAIN with your actual domain
#   4. Get SSL cert:
#        sudo certbot --nginx -d YOUR_DOMAIN
#   5. Test and reload:
#        sudo nginx -t && sudo systemctl reload nginx

# Rate limiting zone (shared across workers)
limit_req_zone $binary_remote_addr zone=api_burst:10m rate=30r/m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL (certbot will auto-configure these)
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # File upload size limit (matches multer 200MB limit)
    client_max_body_size 210m;

    # Timeouts for long-running crawl operations
    proxy_connect_timeout 10s;
    proxy_read_timeout 1800s;   # 30 min — crawls can take 10-20 min
    proxy_send_timeout 300s;

    # Health check — no rate limit
    location /health {
        proxy_pass http://127.0.0.1:8080;
    }

    # Metrics — localhost only
    location /metrics {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8080;
    }

    # SSE + MJPEG streaming — disable buffering
    location ~ ^/api/job-(sse|live-stream)/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }

    # Job start — stricter rate limit
    location /api/start-job {
        limit_req zone=api_burst burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other API routes
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block everything else
    location / {
        return 404;
    }
}
